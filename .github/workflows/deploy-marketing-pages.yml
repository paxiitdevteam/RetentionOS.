# Deploy static marketing site (frontend/marketing-html) to GitHub Pages.
# Repo Settings → Pages → Source: GitHub Actions (required once).
name: Deploy marketing site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/marketing-html

      - id: deployment
        uses: actions/deploy-pages@v4
