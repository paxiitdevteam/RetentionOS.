name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    name: Backend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Compile backend (TypeScript)
        run: npm run backend:build

  dashboard-test:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package.json
      
      - name: Install dependencies
        working-directory: ./dashboard
        run: npm install
      
      - name: Run linter
        working-directory: ./dashboard
        run: npm run lint || true
      
      - name: Build
        working-directory: ./dashboard
        run: npm run build

  widget-build:
    name: Widget Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/widget/package.json
      
      - name: Install dependencies
        working-directory: ./frontend/widget
        run: npm install
      
      - name: Build widget
        working-directory: ./frontend/widget
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: widget-build
          path: frontend/widget/build/
          retention-days: 7

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check file structure
        run: |
          test -f package.json || exit 1
          test -f src-backend/server.ts || exit 1
          test -f dashboard/package.json || exit 1
          test -f frontend/widget/package.json || exit 1
          test -f infra/docker-compose.yml || exit 1
          echo "✅ File structure validated"

